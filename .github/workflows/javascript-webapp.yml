# RUNNER CONFIG: Using GitHub-hosted runners. Switch to self-hosted when ready (see docs/MIGRATION-TO-SELF-HOSTED.md)

name: "JavaScript Web App CI/CD"

on:
  push:
    branches:
      - develop
      - "release/*"
      - "hotfix/*"
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'dev'
        type: choice
        options: [dev, int, qa, stage, prod]

permissions:
  contents: write

env:
  APP_NAME: "js-webapp" # ← CHANGE THIS PER REPO

jobs:
  validate-secrets:
    name: "Integration Status"
    uses: ./.github/workflows/_validate-secrets.yml
    secrets: inherit

  # ──────────────────────────────────────────────
  # 1. Build
  # ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Determine version
        id: version
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [[ "$BRANCH" == release/* ]]; then
            VERSION="${BRANCH#release/}"
          elif [[ "$BRANCH" == hotfix/* ]]; then
            VERSION="${BRANCH#hotfix/}"
          else
            VERSION="dev.${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Test
        run: npm test -- --coverage --watchAll=false

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: '**/junit*.xml,**/test-results/**/*.xml'
          reporter: jest-junit
          fail-on-error: false

      - name: Build
        run: npm run build

      - name: Build Summary
        run: |
          ARTIFACT_SIZE_DIST=$(du -sh dist/ 2>/dev/null | cut -f1 || echo "N/A")
          ARTIFACT_SIZE_BUILD=$(du -sh build/ 2>/dev/null | cut -f1 || echo "N/A")
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Build Summary
          | Item | Value |
          |------|-------|
          | **Version** | \`${{ steps.version.outputs.version }}\` |
          | **Branch** | \`${GITHUB_REF#refs/heads/}\` |
          | **Node.js** | 20 |
          | **Tests** | Passed |
          | **Coverage** | See coverage report |
          | **Artifact size (dist/)** | ${ARTIFACT_SIZE_DIST} |
          | **Artifact size (build/)** | ${ARTIFACT_SIZE_BUILD} |
          EOF

      - name: Log via forgeops-log.sh
        run: |
          if [ -f ./scripts/forgeops-log.sh ]; then
            bash ./scripts/forgeops-log.sh
          else
            echo "forgeops-log.sh not found, skipping."
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            build/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            coverage/
          retention-days: 14

  # ──────────────────────────────────────────────
  # 2. Security scan
  # ──────────────────────────────────────────────
  security:
    needs: build
    uses: ./.github/workflows/_security-scan.yml
    with:
      project_name: ${{ github.event.repository.name }}
      language: javascript
    secrets: inherit

  # ──────────────────────────────────────────────
  # 3. Deploy to dev
  # ──────────────────────────────────────────────
  deploy-dev:
    needs: [build, security]
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_deploy.yml
    with:
      env: dev
      deploy_method: ssh
    secrets: inherit

  # ──────────────────────────────────────────────
  # 4. Deploy to int
  # ──────────────────────────────────────────────
  deploy-int:
    needs: [build, deploy-dev]
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_deploy.yml
    with:
      env: int
    secrets: inherit

  # ──────────────────────────────────────────────
  # 5. Deploy to qa
  # ──────────────────────────────────────────────
  deploy-qa:
    needs: [build, deploy-int]
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_deploy.yml
    with:
      env: qa
    secrets: inherit

  # ──────────────────────────────────────────────
  # 6. Deploy to stage
  # ──────────────────────────────────────────────
  deploy-stage:
    needs: [build, security]
    if: startsWith(github.ref, 'refs/heads/release/')
    uses: ./.github/workflows/_deploy.yml
    with:
      env: stage
    secrets: inherit

  # ──────────────────────────────────────────────
  # 7. DAST (Dynamic Application Security Testing)
  # ──────────────────────────────────────────────
  dast:
    needs: [build, deploy-stage]
    if: startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run DAST scan
        run: |
          if [ -z "${{ vars.STAGE_APP_URL }}" ]; then
            echo "::notice::vars.STAGE_APP_URL is not set — skipping DAST scan."
            echo "## DAST Scan" >> "$GITHUB_STEP_SUMMARY"
            echo "Skipped: \`STAGE_APP_URL\` variable is not configured." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "Target URL: ${{ vars.STAGE_APP_URL }}"

          if command -v zap-cli &>/dev/null; then
            echo "Running ZAP scan against ${{ vars.STAGE_APP_URL }}..."
            zap-cli quick-scan --self-contained -t "${{ vars.STAGE_APP_URL }}" -o "-config api.disablekey=true" || true
            zap-cli report -o dast-report.html -f html || true

            cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## DAST Scan
          | Item | Value |
          |------|-------|
          | **Target** | \`${{ vars.STAGE_APP_URL }}\` |
          | **Tool** | OWASP ZAP |
          | **Status** | Completed — see uploaded report |
          EOF
          else
            echo "::warning::zap-cli not available — skipping DAST scan."
            cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## DAST Scan
          Skipped: \`zap-cli\` is not installed on this runner.
          EOF
          fi

      - name: Upload DAST report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-report
          path: dast-report.html
          if-no-files-found: ignore
          retention-days: 30

  # ──────────────────────────────────────────────
  # 8. Deploy to prod
  # ──────────────────────────────────────────────
  deploy-prod:
    needs: [build, dast]
    if: startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/hotfix/')
    uses: ./.github/workflows/_deploy.yml
    with:
      env: prod
      rollback_on_failure: true
    secrets: inherit

  # ──────────────────────────────────────────────
  # 9. Release tag
  # ──────────────────────────────────────────────
  release-tag:
    needs: [build, deploy-prod]
    if: success() && (startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/hotfix/'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Release ${{ needs.build.outputs.version }}
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.changes }}

            ## Security
            All scans passed ✅

            ---
            *Released by ForgeOps DevSecOps Platform*
          draft: false
          prerelease: false

      - name: Tag summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Release Tag
          | Item | Value |
          |------|-------|
          | **Tag** | \`v${{ needs.build.outputs.version }}\` |
          | **Commit** | \`${{ github.sha }}\` |
          | **Branch** | \`${GITHUB_REF#refs/heads/}\` |
          EOF

  # ──────────────────────────────────────────────
  # 10. Pipeline summary
  # ──────────────────────────────────────────────
  pipeline-summary:
    needs: [build, security, deploy-dev, deploy-int, deploy-qa, deploy-stage, dast, deploy-prod, release-tag]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download forgeops artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: forgeops-*
          merge-multiple: true
          path: forgeops-logs

      - name: Run pipeline summary
        run: |
          if [ -f ./scripts/forgeops-summary.sh ]; then
            bash ./scripts/forgeops-summary.sh
          else
            echo "forgeops-summary.sh not found, writing default summary."
            cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Pipeline Summary
          | Job | Status |
          |-----|--------|
          | Build | \`${{ needs.build.result }}\` |
          | Security | \`${{ needs.security.result }}\` |
          | Deploy Dev | \`${{ needs.deploy-dev.result }}\` |
          | Deploy Int | \`${{ needs.deploy-int.result }}\` |
          | Deploy QA | \`${{ needs.deploy-qa.result }}\` |
          | Deploy Stage | \`${{ needs.deploy-stage.result }}\` |
          | DAST | \`${{ needs.dast.result }}\` |
          | Deploy Prod | \`${{ needs.deploy-prod.result }}\` |
          | Release Tag | \`${{ needs.release-tag.result }}\` |
          EOF
          fi

      - name: Upload audit trail
        uses: actions/upload-artifact@v4
        with:
          name: forgeops-audit-trail
          path: forgeops-logs/
          if-no-files-found: ignore
          retention-days: 365

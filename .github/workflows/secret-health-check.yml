name: "Secret Health Check"

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  validate:
    uses: ./.github/workflows/_validate-secrets.yml
    secrets: inherit

  report:
    name: "Report Missing Secrets"
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check and Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
          S_TOK: ${{ secrets.SONAR_TOKEN }}
          J_TOK: ${{ secrets.JIRA_TOKEN }}
          BD_TOK: ${{ secrets.BLACKDUCK_TOKEN }}
        run: |
          MISSING=""
          [ -z "$S_TOK" ] && MISSING="${MISSING}\n- ⚠️ SONAR_TOKEN — SonarQube SAST scanning disabled"
          [ -z "$J_TOK" ] && MISSING="${MISSING}\n- ⚠️ JIRA_TOKEN — Jira ticket automation disabled"
          [ -z "$BD_TOK" ] && MISSING="${MISSING}\n- ⚠️ BLACKDUCK_TOKEN — Using free OWASP Dep-Check instead"

          if [ -n "$MISSING" ]; then
            TITLE="[ForgeOps] Missing integration secrets — $(date +%Y-%m-%d)"
            BODY="## Missing Secrets\n\nThe following secrets are not configured:\n${MISSING}\n\n## Impact\nPipelines skip these integrations gracefully. Configure secrets in **Settings → Secrets → Actions** to enable.\n\n---\n*Generated by ForgeOps Secret Health Check*"

            gh issue create \
              --repo "${{ github.repository }}" \
              --title "${TITLE}" \
              --body "$(echo -e "${BODY}")" \
              --label "forgeops,configuration" 2>/dev/null || echo "Issue creation skipped (may already exist or labels missing)"
          else
            echo "✅ All critical secrets configured" >> $GITHUB_STEP_SUMMARY
          fi

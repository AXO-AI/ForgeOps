name: "Secret Health Check"
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  validate:
    uses: ./.github/workflows/_validate-secrets.yml
    secrets: inherit
  report:
    name: "Report"
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check and Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
          S1: ${{ secrets.SONAR_TOKEN }}
          S2: ${{ secrets.JIRA_TOKEN }}
        run: |
          MISSING=""
          [ -z "$S1" ] && MISSING="${MISSING}- SONAR_TOKEN not set\n"
          [ -z "$S2" ] && MISSING="${MISSING}- JIRA_TOKEN not set\n"
          if [ -n "$MISSING" ]; then
            gh issue create --repo "${{ github.repository }}" --title "[ForgeOps] Missing secrets — $(date +%Y-%m-%d)" --body "$(echo -e "## Missing Secrets\n${MISSING}\nConfigure in Settings → Secrets → Actions.")" --label "configuration" 2>/dev/null || true
          fi

name: Secret Health Check
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  validate:
    uses: ./.github/workflows/_validate-secrets.yml
    secrets: inherit
  report:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Create issue if needed
        env:
          GH_TOKEN: ${{ github.token }}
          JIRA: ${{ secrets.JIRA_TOKEN }}
          SONAR: ${{ secrets.SONAR_TOKEN }}
        run: |
          MISSING=""
          [ -z "$JIRA" ] && MISSING="${MISSING}- JIRA_TOKEN\n"
          [ -z "$SONAR" ] && MISSING="${MISSING}- SONAR_TOKEN\n"
          if [ -n "$MISSING" ]; then
            gh issue create --repo "${{ github.repository }}" --title "[ForgeOps] Missing secrets $(date +%Y-%m-%d)" --body "$(echo -e "Missing:\n${MISSING}\nAdd in Settings > Secrets > Actions.")" --label "configuration" 2>/dev/null || true
          fi

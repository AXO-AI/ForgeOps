name: Secret Health Check

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check-secrets:
    name: Validate Secrets
    uses: ./.github/workflows/_validate-secrets.yml
    secrets: inherit

  report:
    name: Report Missing Secrets
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.all_configured == 'false'
    steps:
      - name: Create issue for missing secrets
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Secret Health Check - Missing Secrets (${new Date().toISOString().split('T')[0]})`;
            const body = `## Secret Configuration Report\n\n${{ needs.check-secrets.outputs.report }}\n\nPlease configure missing secrets in repository settings.\n\n*Auto-generated by secret-health-check workflow*`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['secrets', 'automated']
            });

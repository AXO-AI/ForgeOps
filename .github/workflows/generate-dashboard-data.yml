name: Generate Dashboard Data
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate data
        run: |
          ORG="${GITHUB_REPOSITORY_OWNER}"
          echo '{"generated":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'","repos":[' > data.tmp
          FIRST=true
          PAGE=1
          while [ $PAGE -le 10 ]; do
            RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/users/$ORG/repos?per_page=100&page=$PAGE&sort=updated")
            COUNT=$(echo "$RESPONSE" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")
            if [ "$COUNT" = "0" ]; then break; fi
            echo "$RESPONSE" | python3 -c "
import sys, json
repos = json.load(sys.stdin)
for r in repos:
    if r['name'] == '${GITHUB_REPOSITORY#*/}':
        continue
    print(json.dumps({'name':r['name'],'updated':r['updated_at'],'language':r.get('language',''),'default_branch':r.get('default_branch','main')}))
" | while read -r line; do
              if [ "$FIRST" = "true" ]; then
                FIRST=false
              else
                printf ',' >> data.tmp
              fi
              echo "$line" >> data.tmp
            done
            FIRST=false
            if [ "$COUNT" -lt 100 ]; then break; fi
            PAGE=$((PAGE+1))
            sleep 1
          done
          echo ']}' >> data.tmp
          python3 -c "import json; d=json.load(open('data.tmp')); print(f'Generated data for {len(d[\"repos\"])} repos'); json.dump(d,open('dashboard-data.json','w'),indent=2)"
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dashboard-data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update dashboard data [skip ci]"
            git push
          fi

name: Notify (Reusable)

on:
  workflow_call:
    inputs:
      subject:
        description: "Notification subject"
        required: true
        type: string
      body:
        description: "Notification body (supports HTML for email)"
        required: true
        type: string
      severity:
        description: "Severity level (info, warning, critical)"
        required: false
        type: string
        default: "info"
      run_url:
        description: "URL to the workflow run"
        required: false
        type: string
        default: ""
    secrets:
      EMAIL_SERVER:
        required: false
      EMAIL_PORT:
        required: false
      EMAIL_USERNAME:
        required: false
      EMAIL_PASSWORD:
        required: false
      EMAIL_TO:
        required: false
      EMAIL_FROM:
        required: false
      TEAMS_WEBHOOK_URL:
        required: false
      SPLUNK_HEC_URL:
        required: false
      SPLUNK_HEC_TOKEN:
        required: false

jobs:
  email:
    name: Email Notification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set script permissions
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Check email secrets
        id: check-email
        run: |
          if [ -n "$EMAIL_SERVER_CHECK" ] && [ -n "$EMAIL_USERNAME_CHECK" ] && [ -n "$EMAIL_PASSWORD_CHECK" ] && [ -n "$EMAIL_TO_CHECK" ]; then
            echo "email_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "email_available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Email secrets not configured - email notification will be skipped"
          fi
        env:
          EMAIL_SERVER_CHECK: ${{ secrets.EMAIL_SERVER }}
          EMAIL_USERNAME_CHECK: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD_CHECK: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO_CHECK: ${{ secrets.EMAIL_TO }}

      - name: Send email notification
        if: steps.check-email.outputs.email_available == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.EMAIL_SERVER }}
          server_port: ${{ secrets.EMAIL_PORT || '587' }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[${{ inputs.severity }}] ${{ inputs.subject }}"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM || secrets.EMAIL_USERNAME }}
          html_body: |
            <h2>${{ inputs.subject }}</h2>
            <p><strong>Severity:</strong> ${{ inputs.severity }}</p>
            <div>${{ inputs.body }}</div>
            <p><strong>Repository:</strong> ${{ github.repository }}</p>
            <p><strong>Run:</strong> <a href="${{ inputs.run_url || format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}">View workflow run</a></p>

      - name: Skip email notification
        if: steps.check-email.outputs.email_available != 'true'
        run: |
          echo "SKIP: Email notification skipped - secrets not configured"
          echo "Required secrets: EMAIL_SERVER, EMAIL_USERNAME, EMAIL_PASSWORD, EMAIL_TO"

  teams:
    name: Teams Notification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set script permissions
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Check Teams secrets
        id: check-teams
        run: |
          if [ -n "$TEAMS_WEBHOOK_CHECK" ]; then
            echo "teams_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "teams_available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Teams webhook not configured - Teams notification will be skipped"
          fi
        env:
          TEAMS_WEBHOOK_CHECK: ${{ secrets.TEAMS_WEBHOOK_URL }}

      - name: Send Teams notification
        if: steps.check-teams.outputs.teams_available == 'true'
        run: |
          severity="${{ inputs.severity }}"
          case "$severity" in
            critical) color="FF0000" ;;
            warning)  color="FFA500" ;;
            *)        color="0078D4" ;;
          esac

          run_url="${{ inputs.run_url }}"
          if [ -z "$run_url" ]; then
            run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          payload=$(cat <<PAYLOAD
          {
            "@type": "MessageCard",
            "@context": "http://schema.org/extensions",
            "themeColor": "${color}",
            "summary": "${{ inputs.subject }}",
            "sections": [{
              "activityTitle": "${{ inputs.subject }}",
              "facts": [
                { "name": "Severity", "value": "${severity}" },
                { "name": "Repository", "value": "${{ github.repository }}" },
                { "name": "Branch", "value": "${{ github.ref_name }}" }
              ],
              "text": "${{ inputs.body }}",
              "markdown": true
            }],
            "potentialAction": [{
              "@type": "OpenUri",
              "name": "View Run",
              "targets": [{ "os": "default", "uri": "${run_url}" }]
            }]
          }
          PAYLOAD
          )

          curl -sSf -X POST "$TEAMS_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

      - name: Skip Teams notification
        if: steps.check-teams.outputs.teams_available != 'true'
        run: |
          echo "SKIP: Teams notification skipped - webhook not configured"
          echo "Required secrets: TEAMS_WEBHOOK_URL"

  splunk:
    name: Splunk Event
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set script permissions
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Check Splunk secrets
        id: check-splunk
        run: |
          if [ -n "$SPLUNK_URL_CHECK" ] && [ -n "$SPLUNK_TOKEN_CHECK" ]; then
            echo "splunk_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "splunk_available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Splunk HEC not configured - Splunk event will be skipped"
          fi
        env:
          SPLUNK_URL_CHECK: ${{ secrets.SPLUNK_HEC_URL }}
          SPLUNK_TOKEN_CHECK: ${{ secrets.SPLUNK_HEC_TOKEN }}

      - name: Send Splunk event
        if: steps.check-splunk.outputs.splunk_available == 'true'
        run: |
          timestamp=$(date +%s)
          run_url="${{ inputs.run_url }}"
          if [ -z "$run_url" ]; then
            run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          curl -sSf -X POST "$SPLUNK_HEC_URL" \
            -H "Authorization: Splunk $SPLUNK_HEC_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"time\": ${timestamp},
              \"sourcetype\": \"github:actions\",
              \"source\": \"${{ github.repository }}\",
              \"event\": {
                \"subject\": \"${{ inputs.subject }}\",
                \"severity\": \"${{ inputs.severity }}\",
                \"body\": \"${{ inputs.body }}\",
                \"repository\": \"${{ github.repository }}\",
                \"ref\": \"${{ github.ref_name }}\",
                \"run_id\": \"${{ github.run_id }}\",
                \"run_url\": \"${run_url}\",
                \"actor\": \"${{ github.actor }}\"
              }
            }"
        env:
          SPLUNK_HEC_URL: ${{ secrets.SPLUNK_HEC_URL }}
          SPLUNK_HEC_TOKEN: ${{ secrets.SPLUNK_HEC_TOKEN }}

      - name: Skip Splunk event
        if: steps.check-splunk.outputs.splunk_available != 'true'
        run: |
          echo "SKIP: Splunk event skipped - HEC not configured"
          echo "Required secrets: SPLUNK_HEC_URL, SPLUNK_HEC_TOKEN"

##############################################################################
# _deploy.yml  --  Reusable deployment workflow for ForgeOps
#
# Called via `workflow_call` from app-specific pipelines.
# Supports SSH, ArgoCD, and UiPath Orchestrator deploy methods with
# automatic rollback, health-checking, ITSM integration, and audit trail.
##############################################################################
name: Deploy

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      version:
        required: true
        type: string
      environment:
        required: true
        type: string
        description: "Target environment: dev | int | qa | stage | prod"
      deploy_method:
        required: false
        type: string
        default: "ssh"
        description: "Deployment method: ssh | argocd | uipath-orchestrator"
      deploy_host:
        required: false
        type: string
        default: ""
      deploy_path:
        required: false
        type: string
        default: "/opt/apps"
      health_url:
        required: false
        type: string
        default: ""
      artifact_name:
        required: false
        type: string
        default: "build-artifacts"
      rollback_on_failure:
        required: false
        type: boolean
        default: true

    secrets:
      DEPLOY_SSH_KEY:
        required: false
      DEPLOY_SSH_USER:
        required: false
      DEV_DEPLOY_HOST:
        required: false
      INT_DEPLOY_HOST:
        required: false
      QA_DEPLOY_HOST:
        required: false
      STAGE_DEPLOY_HOST:
        required: false
      PROD_DEPLOY_HOST:
        required: false
      ARGOCD_SERVER:
        required: false
      ARGOCD_AUTH_TOKEN:
        required: false
      UIPATH_ORCH_URL:
        required: false
      UIPATH_CLIENT_ID:
        required: false
      UIPATH_CLIENT_SECRET:
        required: false
      UIPATH_TENANT:
        required: false
      UIPATH_FOLDER:
        required: false
      JIRA_URL:
        required: false
      JIRA_TOKEN:
        required: false
      CHERWELL_URL:
        required: false
      CHERWELL_CLIENT_ID:
        required: false
      CHERWELL_CLIENT_SECRET:
        required: false
      SERVICENOW_URL:
        required: false
      SERVICENOW_USER:
        required: false
      SERVICENOW_PASSWORD:
        required: false
      SLACK_WEBHOOK_URL:
        required: false
      SPLUNK_HEC_URL:
        required: false
      SPLUNK_HEC_TOKEN:
        required: false
      SPLUNK_INDEX:
        required: false

jobs:
  deploy:
    name: Deploy ${{ inputs.app_name }} ${{ inputs.version }} to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    env:
      SPLUNK_HEC_URL: ${{ secrets.SPLUNK_HEC_URL }}
      SPLUNK_HEC_TOKEN: ${{ secrets.SPLUNK_HEC_TOKEN }}
      SPLUNK_INDEX: ${{ secrets.SPLUNK_INDEX }}

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout repository
      # ------------------------------------------------------------------ #
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Download build artifacts
      # ------------------------------------------------------------------ #
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ./artifacts

      # ------------------------------------------------------------------ #
      # 3. Deploy header -- summary + audit log
      # ------------------------------------------------------------------ #
      - name: Deploy header
        run: |
          mkdir -p .forgeops
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Deployment Started
          | Field | Value |
          |-------|-------|
          | **Application** | \`${{ inputs.app_name }}\` |
          | **Version** | \`${{ inputs.version }}\` |
          | **Environment** | \`${{ inputs.environment }}\` |
          | **Method** | \`${{ inputs.deploy_method }}\` |
          | **Actor** | \`${{ github.actor }}\` |
          | **Timestamp** | \`$(date -u +"%Y-%m-%dT%H:%M:%SZ")\` |
          EOF

          if [ -x scripts/forgeops-log.sh ]; then
            bash scripts/forgeops-log.sh \
              --event "deploy-started" \
              --app "${{ inputs.app_name }}" \
              --version "${{ inputs.version }}" \
              --env "${{ inputs.environment }}" \
              --method "${{ inputs.deploy_method }}" \
              --actor "${{ github.actor }}"
          fi

      # ------------------------------------------------------------------ #
      # 4. Jira transition
      # ------------------------------------------------------------------ #
      - name: Jira transition
        run: |
          if [ -z "${{ secrets.JIRA_URL }}" ] || [ -z "${{ secrets.JIRA_TOKEN }}" ]; then
            echo "::notice::Jira integration not configured -- skipping transition."
            cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          > **Jira**: Skipped -- `JIRA_URL` / `JIRA_TOKEN` not set.
          EOF
            exit 0
          fi

          case "${{ inputs.environment }}" in
            dev)   JIRA_STATUS="In Development" ;;
            int)   JIRA_STATUS="In Integration" ;;
            qa)    JIRA_STATUS="In QA" ;;
            stage) JIRA_STATUS="In Staging" ;;
            prod)  JIRA_STATUS="Done" ;;
            *)     JIRA_STATUS="In Progress" ;;
          esac

          python3 scripts/jira-integration.py transition \
            --url "${{ secrets.JIRA_URL }}" \
            --token "${{ secrets.JIRA_TOKEN }}" \
            --app "${{ inputs.app_name }}" \
            --version "${{ inputs.version }}" \
            --status "$JIRA_STATUS"

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          > **Jira**: Transitioned to **${JIRA_STATUS}**
          EOF

      # ------------------------------------------------------------------ #
      # 5. ITSM Change Request (stage / prod only)
      # ------------------------------------------------------------------ #
      - name: ITSM Change Request
        if: inputs.environment == 'stage' || inputs.environment == 'prod'
        id: itsm
        run: |
          if [ -z "${{ secrets.CHERWELL_URL }}" ] && [ -z "${{ secrets.SERVICENOW_URL }}" ]; then
            echo "::notice::No ITSM provider configured -- skipping CR creation."
            cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          > **ITSM**: Skipped -- neither Cherwell nor ServiceNow configured.
          EOF
            exit 0
          fi

          CR_ID=""
          if [ -n "${{ secrets.CHERWELL_URL }}" ]; then
            CR_ID=$(python3 scripts/cherwell-integration.py create-cr \
              --url "${{ secrets.CHERWELL_URL }}" \
              --client-id "${{ secrets.CHERWELL_CLIENT_ID }}" \
              --client-secret "${{ secrets.CHERWELL_CLIENT_SECRET }}" \
              --app "${{ inputs.app_name }}" \
              --version "${{ inputs.version }}" \
              --env "${{ inputs.environment }}")
          fi

          echo "cr_id=${CR_ID}" >> "$GITHUB_OUTPUT"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          > **ITSM CR**: \`${CR_ID}\`
          EOF

      # ------------------------------------------------------------------ #
      # 6. Deploy -- SSH
      # ------------------------------------------------------------------ #
      - name: Deploy via SSH
        if: inputs.deploy_method == 'ssh'
        id: deploy_ssh
        run: |
          # Resolve host: explicit input > environment-specific secret
          DEPLOY_HOST="${{ inputs.deploy_host }}"
          if [ -z "$DEPLOY_HOST" ]; then
            case "${{ inputs.environment }}" in
              dev)   DEPLOY_HOST="${{ secrets.DEV_DEPLOY_HOST }}" ;;
              int)   DEPLOY_HOST="${{ secrets.INT_DEPLOY_HOST }}" ;;
              qa)    DEPLOY_HOST="${{ secrets.QA_DEPLOY_HOST }}" ;;
              stage) DEPLOY_HOST="${{ secrets.STAGE_DEPLOY_HOST }}" ;;
              prod)  DEPLOY_HOST="${{ secrets.PROD_DEPLOY_HOST }}" ;;
            esac
          fi

          SSH_KEY="${{ secrets.DEPLOY_SSH_KEY }}"
          SSH_USER="${{ secrets.DEPLOY_SSH_USER }}"

          if [ -z "$SSH_KEY" ] || [ -z "$DEPLOY_HOST" ]; then
            cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          > **SSH Deploy**: :next_track_button: SSH deploy not configured -- dry run
          >
          > Artifacts that would have been deployed:
          EOF
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            ls -lhR ./artifacts >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Write SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_OPTS="-o StrictHostKeyChecking=no -i ~/.ssh/deploy_key"

          REMOTE="${SSH_USER}@${DEPLOY_HOST}"
          APP_DIR="${{ inputs.deploy_path }}/${{ inputs.app_name }}"

          # Backup current release
          ssh $SSH_OPTS "$REMOTE" \
            "if [ -d ${APP_DIR}/current ]; then cp -a ${APP_DIR}/current ${APP_DIR}/previous; fi"

          # Upload artifacts
          scp $SSH_OPTS -r ./artifacts/* "$REMOTE:${APP_DIR}/current/"

          # Restart service
          ssh $SSH_OPTS "$REMOTE" \
            "if [ -x ${APP_DIR}/current/restart.sh ]; then ${APP_DIR}/current/restart.sh; elif systemctl is-active --quiet ${{ inputs.app_name }}; then sudo systemctl restart ${{ inputs.app_name }}; fi"

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          > **SSH Deploy**: Deployed to \`${DEPLOY_HOST}:${APP_DIR}/current\`
          EOF

      # ------------------------------------------------------------------ #
      # 7. Deploy -- ArgoCD
      # ------------------------------------------------------------------ #
      - name: Deploy via ArgoCD
        if: inputs.deploy_method == 'argocd'
        id: deploy_argocd
        run: |
          if [ -z "${{ secrets.ARGOCD_SERVER }}" ]; then
            echo "::notice::ArgoCD not configured -- skipping."
            cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          > **ArgoCD Deploy**: Skipped -- `ARGOCD_SERVER` not set.
          EOF
            exit 0
          fi

          export ARGOCD_SERVER="${{ secrets.ARGOCD_SERVER }}"
          export ARGOCD_AUTH_TOKEN="${{ secrets.ARGOCD_AUTH_TOKEN }}"

          ARGO_APP="${{ inputs.app_name }}-${{ inputs.environment }}"

          argocd app set "$ARGO_APP" \
            --parameter image.tag="${{ inputs.version }}" \
            --grpc-web

          argocd app sync "$ARGO_APP" --grpc-web
          argocd app wait "$ARGO_APP" --timeout 300 --grpc-web

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          > **ArgoCD Deploy**: Synced \`${ARGO_APP}\` to version \`${{ inputs.version }}\`
          EOF

      # ------------------------------------------------------------------ #
      # 8. Deploy -- UiPath Orchestrator
      # ------------------------------------------------------------------ #
      - name: Deploy via UiPath Orchestrator
        if: inputs.deploy_method == 'uipath-orchestrator'
        id: deploy_uipath
        run: |
          if [ -z "${{ secrets.UIPATH_ORCH_URL }}" ]; then
            echo "::notice::UiPath Orchestrator not configured -- skipping."
            cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          > **UiPath Deploy**: Skipped -- `UIPATH_ORCH_URL` not set.
          EOF
            exit 0
          fi

          PACKAGE_FILE=$(find ./artifacts -name "*.nupkg" | head -1)
          if [ -z "$PACKAGE_FILE" ]; then
            echo "::error::No .nupkg package found in artifacts"
            exit 1
          fi

          uipcli package deploy \
            "${{ secrets.UIPATH_ORCH_URL }}" \
            "${{ secrets.UIPATH_TENANT }}" \
            --clientId "${{ secrets.UIPATH_CLIENT_ID }}" \
            --clientSecret "${{ secrets.UIPATH_CLIENT_SECRET }}" \
            --organizationUnit "${{ secrets.UIPATH_FOLDER }}" \
            --packages "$PACKAGE_FILE" \
            --environments "${{ inputs.environment }}"

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          > **UiPath Deploy**: Published \`$(basename "$PACKAGE_FILE")\` to \`${{ inputs.environment }}\`
          EOF

      # ------------------------------------------------------------------ #
      # 9. Health check
      # ------------------------------------------------------------------ #
      - name: Health check
        if: inputs.health_url != ''
        id: healthcheck
        run: |
          URL="${{ inputs.health_url }}"
          MAX_ATTEMPTS=10
          if [ "${{ inputs.environment }}" = "prod" ]; then
            MAX_ATTEMPTS=15
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ### Health Check Results
          | Attempt | Status | Response Code | Timestamp |
          |---------|--------|---------------|-----------|
          EOF

          CONSECUTIVE_FAILURES=0
          HEALTHY=false

          for i in $(seq 1 $MAX_ATTEMPTS); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" 2>/dev/null || echo "000")
            TIMESTAMP=$(date -u +"%H:%M:%S")

            if [ "$HTTP_CODE" -ge 200 ] 2>/dev/null && [ "$HTTP_CODE" -lt 400 ] 2>/dev/null; then
              STATUS="Healthy"
              CONSECUTIVE_FAILURES=0
              HEALTHY=true
              echo "| $i | :white_check_mark: $STATUS | $HTTP_CODE | $TIMESTAMP |" >> "$GITHUB_STEP_SUMMARY"
              echo "Health check passed on attempt $i"
              break
            else
              STATUS="Unhealthy"
              CONSECUTIVE_FAILURES=$((CONSECUTIVE_FAILURES + 1))
              echo "| $i | :x: $STATUS | $HTTP_CODE | $TIMESTAMP |" >> "$GITHUB_STEP_SUMMARY"
              echo "::warning::Health check attempt $i failed (HTTP $HTTP_CODE)"

              if [ "$CONSECUTIVE_FAILURES" -ge 3 ]; then
                echo "::error::3 consecutive health check failures -- triggering rollback."
                echo "rollback=true" >> "$GITHUB_OUTPUT"
                exit 1
              fi
            fi

            if [ "$i" -lt "$MAX_ATTEMPTS" ]; then
              sleep 15
            fi
          done

          if [ "$HEALTHY" != "true" ]; then
            echo "::error::Health check did not pass within $MAX_ATTEMPTS attempts."
            echo "rollback=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      # ------------------------------------------------------------------ #
      # 10. Rollback on failure
      # ------------------------------------------------------------------ #
      - name: Rollback on failure
        if: failure() && inputs.rollback_on_failure
        run: |
          echo "::warning::Deployment failed -- initiating rollback."
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ### :rotating_light: Rollback Initiated
          EOF

          if [ "${{ inputs.deploy_method }}" = "ssh" ]; then
            DEPLOY_HOST="${{ inputs.deploy_host }}"
            if [ -z "$DEPLOY_HOST" ]; then
              case "${{ inputs.environment }}" in
                dev)   DEPLOY_HOST="${{ secrets.DEV_DEPLOY_HOST }}" ;;
                int)   DEPLOY_HOST="${{ secrets.INT_DEPLOY_HOST }}" ;;
                qa)    DEPLOY_HOST="${{ secrets.QA_DEPLOY_HOST }}" ;;
                stage) DEPLOY_HOST="${{ secrets.STAGE_DEPLOY_HOST }}" ;;
                prod)  DEPLOY_HOST="${{ secrets.PROD_DEPLOY_HOST }}" ;;
              esac
            fi

            SSH_KEY="${{ secrets.DEPLOY_SSH_KEY }}"
            SSH_USER="${{ secrets.DEPLOY_SSH_USER }}"

            if [ -n "$SSH_KEY" ] && [ -n "$DEPLOY_HOST" ]; then
              mkdir -p ~/.ssh
              echo "$SSH_KEY" > ~/.ssh/deploy_key
              chmod 600 ~/.ssh/deploy_key
              SSH_OPTS="-o StrictHostKeyChecking=no -i ~/.ssh/deploy_key"
              REMOTE="${SSH_USER}@${DEPLOY_HOST}"
              APP_DIR="${{ inputs.deploy_path }}/${{ inputs.app_name }}"

              ssh $SSH_OPTS "$REMOTE" \
                "if [ -d ${APP_DIR}/previous ]; then rm -rf ${APP_DIR}/current && mv ${APP_DIR}/previous ${APP_DIR}/current; fi"
              ssh $SSH_OPTS "$REMOTE" \
                "if [ -x ${APP_DIR}/current/restart.sh ]; then ${APP_DIR}/current/restart.sh; elif systemctl is-active --quiet ${{ inputs.app_name }}; then sudo systemctl restart ${{ inputs.app_name }}; fi"

              cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          > **Rollback**: Restored previous SSH release.
          EOF
            fi

          elif [ "${{ inputs.deploy_method }}" = "argocd" ]; then
            if [ -n "${{ secrets.ARGOCD_SERVER }}" ]; then
              export ARGOCD_SERVER="${{ secrets.ARGOCD_SERVER }}"
              export ARGOCD_AUTH_TOKEN="${{ secrets.ARGOCD_AUTH_TOKEN }}"
              ARGO_APP="${{ inputs.app_name }}-${{ inputs.environment }}"

              argocd app rollback "$ARGO_APP" --grpc-web

              cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          > **Rollback**: ArgoCD rollback completed.
          EOF
            fi
          fi

          if [ -x scripts/forgeops-log.sh ]; then
            bash scripts/forgeops-log.sh \
              --event "deploy-rollback" \
              --app "${{ inputs.app_name }}" \
              --version "${{ inputs.version }}" \
              --env "${{ inputs.environment }}" \
              --actor "${{ github.actor }}"
          fi

      # ------------------------------------------------------------------ #
      # 11. Jira fix version (prod success only)
      # ------------------------------------------------------------------ #
      - name: Jira fix version
        if: success() && inputs.environment == 'prod'
        run: |
          if [ -z "${{ secrets.JIRA_URL }}" ] || [ -z "${{ secrets.JIRA_TOKEN }}" ]; then
            echo "::notice::Jira not configured -- skipping fix version."
            exit 0
          fi

          python3 scripts/jira-integration.py fix-version \
            --url "${{ secrets.JIRA_URL }}" \
            --token "${{ secrets.JIRA_TOKEN }}" \
            --app "${{ inputs.app_name }}" \
            --version "${{ inputs.version }}"

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          > **Jira**: Fix version \`${{ inputs.version }}\` applied.
          EOF

      # ------------------------------------------------------------------ #
      # 12. Update ITSM CR (stage / prod)
      # ------------------------------------------------------------------ #
      - name: Update ITSM Change Request
        if: always() && (inputs.environment == 'stage' || inputs.environment == 'prod')
        run: |
          CR_ID="${{ steps.itsm.outputs.cr_id }}"
          if [ -z "$CR_ID" ]; then
            echo "::notice::No CR ID found -- skipping ITSM update."
            exit 0
          fi

          if [ "${{ job.status }}" = "success" ]; then
            CR_STATUS="Implemented"
          else
            CR_STATUS="Failed"
          fi

          if [ -n "${{ secrets.CHERWELL_URL }}" ]; then
            python3 scripts/cherwell-integration.py update-cr \
              --url "${{ secrets.CHERWELL_URL }}" \
              --client-id "${{ secrets.CHERWELL_CLIENT_ID }}" \
              --client-secret "${{ secrets.CHERWELL_CLIENT_SECRET }}" \
              --cr-id "$CR_ID" \
              --status "$CR_STATUS"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          > **ITSM CR** \`${CR_ID}\`: updated to **${CR_STATUS}**
          EOF

      # ------------------------------------------------------------------ #
      # 13. Deploy summary
      # ------------------------------------------------------------------ #
      - name: Deploy summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ---
          ### Deployment Summary
          | Field | Value |
          |-------|-------|
          | **Application** | \`${{ inputs.app_name }}\` |
          | **Version** | \`${{ inputs.version }}\` |
          | **Environment** | \`${{ inputs.environment }}\` |
          | **Method** | \`${{ inputs.deploy_method }}\` |
          | **Status** | \`${{ job.status }}\` |
          | **Actor** | \`${{ github.actor }}\` |
          | **Run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
          | **Completed** | \`$(date -u +"%Y-%m-%dT%H:%M:%SZ")\` |
          EOF

      # ------------------------------------------------------------------ #
      # 14. Slack notification
      # ------------------------------------------------------------------ #
      - name: Slack notification
        if: always()
        run: |
          if [ -z "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            echo "::notice::Slack webhook not configured -- skipping notification."
            exit 0
          fi

          if [ "${{ job.status }}" = "success" ]; then
            COLOR="good"
            EMOJI=":white_check_mark:"
            STATUS_TEXT="succeeded"
          elif [ "${{ job.status }}" = "cancelled" ]; then
            COLOR="warning"
            EMOJI=":warning:"
            STATUS_TEXT="cancelled"
          else
            COLOR="danger"
            EMOJI=":x:"
            STATUS_TEXT="failed"
          fi

          PAYLOAD=$(cat <<EOJSON
          {
            "attachments": [
              {
                "color": "${COLOR}",
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "${EMOJI} *Deployment ${STATUS_TEXT}*\n*App:* \`${{ inputs.app_name }}\`  |  *Version:* \`${{ inputs.version }}\`  |  *Env:* \`${{ inputs.environment }}\`\n*Actor:* ${{ github.actor }}  |  *Method:* ${{ inputs.deploy_method }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run #${{ github.run_number }}>"
                    }
                  }
                ]
              }
            ]
          }
          EOJSON
          )

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${{ secrets.SLACK_WEBHOOK_URL }}"

      # ------------------------------------------------------------------ #
      # 15. Upload audit trail
      # ------------------------------------------------------------------ #
      - name: Upload audit trail
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forgeops-audit-${{ inputs.app_name }}-${{ inputs.environment }}-${{ github.run_number }}
          path: .forgeops/
          if-no-files-found: ignore
          retention-days: 90

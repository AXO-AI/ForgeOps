name: Deploy (Reusable)

on:
  workflow_call:
    inputs:
      app_name:
        description: "Application name"
        required: true
        type: string
      environment:
        description: "Target environment (int, qa, stage, prod)"
        required: true
        type: string
      version:
        description: "Version/tag to deploy"
        required: true
        type: string
      deploy_method:
        description: "Deployment method (ssh, argocd, uipath)"
        required: false
        type: string
        default: "argocd"
      skip_jira:
        description: "Skip Jira transition"
        required: false
        type: boolean
        default: false
    secrets:
      SSH_HOST:
        required: false
      SSH_USER:
        required: false
      SSH_PRIVATE_KEY:
        required: false
      ARGOCD_SERVER:
        required: false
      ARGOCD_AUTH_TOKEN:
        required: false
      UIPATH_ORCH_URL:
        required: false
      UIPATH_ORCH_TOKEN:
        required: false
      JIRA_BASE_URL:
        required: false
      JIRA_USER_EMAIL:
        required: false
      JIRA_API_TOKEN:
        required: false
      DEPLOY_WEBHOOK_URL:
        required: false

jobs:
  deploy:
    name: Deploy ${{ inputs.app_name }} to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set script permissions
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Validate inputs
        run: |
          echo "Application: ${{ inputs.app_name }}"
          echo "Environment: ${{ inputs.environment }}"
          echo "Version: ${{ inputs.version }}"
          echo "Deploy method: ${{ inputs.deploy_method }}"

          valid_envs="int qa stage prod"
          if ! echo "$valid_envs" | grep -qw "${{ inputs.environment }}"; then
            echo "ERROR: Invalid environment '${{ inputs.environment }}'. Must be one of: $valid_envs"
            exit 1
          fi

      - name: Map Jira transition
        id: jira-map
        run: |
          case "${{ inputs.environment }}" in
            int)
              echo "jira_transition=Ready for Unit Testing" >> "$GITHUB_OUTPUT"
              ;;
            qa)
              echo "jira_transition=Ready for SIT" >> "$GITHUB_OUTPUT"
              ;;
            stage)
              echo "jira_transition=Ready for UAT" >> "$GITHUB_OUTPUT"
              ;;
            prod)
              echo "jira_transition=Deployed to Production" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Check deployment secrets
        id: check-deploy
        run: |
          method="${{ inputs.deploy_method }}"

          if [ "$method" = "ssh" ]; then
            if [ -n "$SSH_HOST_CHECK" ] && [ -n "$SSH_USER_CHECK" ] && [ -n "$SSH_KEY_CHECK" ]; then
              echo "ssh_available=true" >> "$GITHUB_OUTPUT"
            else
              echo "ssh_available=false" >> "$GITHUB_OUTPUT"
              echo "::warning::SSH secrets not configured - SSH deployment will be skipped"
            fi
          fi

          if [ "$method" = "argocd" ]; then
            if [ -n "$ARGOCD_SERVER_CHECK" ] && [ -n "$ARGOCD_TOKEN_CHECK" ]; then
              echo "argocd_available=true" >> "$GITHUB_OUTPUT"
            else
              echo "argocd_available=false" >> "$GITHUB_OUTPUT"
              echo "::warning::ArgoCD secrets not configured - ArgoCD deployment will be skipped"
            fi
          fi

          if [ "$method" = "uipath" ]; then
            if [ -n "$UIPATH_URL_CHECK" ] && [ -n "$UIPATH_TOKEN_CHECK" ]; then
              echo "uipath_available=true" >> "$GITHUB_OUTPUT"
            else
              echo "uipath_available=false" >> "$GITHUB_OUTPUT"
              echo "::warning::UiPath secrets not configured - UiPath deployment will be skipped"
            fi
          fi
        env:
          SSH_HOST_CHECK: ${{ secrets.SSH_HOST }}
          SSH_USER_CHECK: ${{ secrets.SSH_USER }}
          SSH_KEY_CHECK: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGOCD_SERVER_CHECK: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_TOKEN_CHECK: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          UIPATH_URL_CHECK: ${{ secrets.UIPATH_ORCH_URL }}
          UIPATH_TOKEN_CHECK: ${{ secrets.UIPATH_ORCH_TOKEN }}

      - name: Deploy via SSH
        if: inputs.deploy_method == 'ssh' && steps.check-deploy.outputs.ssh_available == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Deploying ${{ inputs.app_name }} version ${{ inputs.version }} to ${{ inputs.environment }}"
            cd /opt/apps/${{ inputs.app_name }}
            ./deploy.sh ${{ inputs.version }}

      - name: Skip SSH deployment
        if: inputs.deploy_method == 'ssh' && steps.check-deploy.outputs.ssh_available != 'true'
        run: |
          echo "SKIP: SSH deployment skipped - secrets not configured"
          echo "Required secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY"

      - name: Deploy via ArgoCD
        if: inputs.deploy_method == 'argocd' && steps.check-deploy.outputs.argocd_available == 'true'
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd

          ./argocd app set "${{ inputs.app_name }}-${{ inputs.environment }}" \
            --server "${{ secrets.ARGOCD_SERVER }}" \
            --auth-token "${{ secrets.ARGOCD_AUTH_TOKEN }}" \
            --grpc-web \
            -p image.tag="${{ inputs.version }}"

          ./argocd app sync "${{ inputs.app_name }}-${{ inputs.environment }}" \
            --server "${{ secrets.ARGOCD_SERVER }}" \
            --auth-token "${{ secrets.ARGOCD_AUTH_TOKEN }}" \
            --grpc-web \
            --prune

          ./argocd app wait "${{ inputs.app_name }}-${{ inputs.environment }}" \
            --server "${{ secrets.ARGOCD_SERVER }}" \
            --auth-token "${{ secrets.ARGOCD_AUTH_TOKEN }}" \
            --grpc-web \
            --timeout 300

      - name: Skip ArgoCD deployment
        if: inputs.deploy_method == 'argocd' && steps.check-deploy.outputs.argocd_available != 'true'
        run: |
          echo "SKIP: ArgoCD deployment skipped - secrets not configured"
          echo "Required secrets: ARGOCD_SERVER, ARGOCD_AUTH_TOKEN"

      - name: Deploy via UiPath
        if: inputs.deploy_method == 'uipath' && steps.check-deploy.outputs.uipath_available == 'true'
        run: |
          echo "Deploying UiPath process ${{ inputs.app_name }} version ${{ inputs.version }}"
          curl -sSf -X POST \
            "${{ secrets.UIPATH_ORCH_URL }}/odata/Releases" \
            -H "Authorization: Bearer ${{ secrets.UIPATH_ORCH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "Name": "${{ inputs.app_name }}",
              "ProcessVersion": "${{ inputs.version }}",
              "EnvironmentId": "${{ inputs.environment }}"
            }'

      - name: Skip UiPath deployment
        if: inputs.deploy_method == 'uipath' && steps.check-deploy.outputs.uipath_available != 'true'
        run: |
          echo "SKIP: UiPath deployment skipped - secrets not configured"
          echo "Required secrets: UIPATH_ORCH_URL, UIPATH_ORCH_TOKEN"

      - name: Write deploy summary
        if: always()
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Application | ${{ inputs.app_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | ${{ inputs.environment }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${{ inputs.version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Method | ${{ inputs.deploy_method }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Jira Transition | ${{ steps.jira-map.outputs.jira_transition }} |" >> "$GITHUB_STEP_SUMMARY"

  jira-transition:
    name: Jira Transition
    runs-on: ubuntu-latest
    needs: deploy
    if: inputs.skip_jira != true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set script permissions
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Check Jira secrets
        id: check-jira
        run: |
          if [ -n "$JIRA_URL_CHECK" ] && [ -n "$JIRA_EMAIL_CHECK" ] && [ -n "$JIRA_TOKEN_CHECK" ]; then
            echo "jira_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "jira_available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Jira secrets not configured - transition will be skipped"
          fi
        env:
          JIRA_URL_CHECK: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL_CHECK: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_TOKEN_CHECK: ${{ secrets.JIRA_API_TOKEN }}

      - name: Resolve Jira transition name
        id: resolve
        if: steps.check-jira.outputs.jira_available == 'true'
        run: |
          case "${{ inputs.environment }}" in
            int)
              echo "transition=Ready for Unit Testing" >> "$GITHUB_OUTPUT"
              ;;
            qa)
              echo "transition=Ready for SIT" >> "$GITHUB_OUTPUT"
              ;;
            stage)
              echo "transition=Ready for UAT" >> "$GITHUB_OUTPUT"
              ;;
            prod)
              echo "transition=Deployed to Production" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Transition Jira issue
        if: steps.check-jira.outputs.jira_available == 'true'
        run: |
          echo "Transitioning Jira issue to: ${{ steps.resolve.outputs.transition }}"
          # Extract ticket from branch or commit
          ticket=$(echo "${{ github.head_ref || github.ref_name }}" | grep -oE '[A-Z]+-[0-9]+' | head -1 || true)
          if [ -z "$ticket" ]; then
            echo "SKIP: No Jira ticket found in branch name"
            exit 0
          fi
          echo "Found Jira ticket: $ticket"

          # Get available transitions
          transitions=$(curl -sSf -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/2/issue/${ticket}/transitions" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for t in data.get('transitions', []):
              print(f\"{t['id']}:{t['name']}\")
          " 2>/dev/null || true)

          target="${{ steps.resolve.outputs.transition }}"
          tid=$(echo "$transitions" | grep "$target" | cut -d: -f1 | head -1)

          if [ -n "$tid" ]; then
            curl -sSf -X POST \
              -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              "${{ secrets.JIRA_BASE_URL }}/rest/api/2/issue/${ticket}/transitions" \
              -d "{\"transition\":{\"id\":\"${tid}\"}}"
            echo "Jira issue $ticket transitioned to: $target"
          else
            echo "SKIP: Transition '$target' not available for $ticket"
          fi

      - name: Skip Jira transition
        if: steps.check-jira.outputs.jira_available != 'true'
        run: |
          echo "SKIP: Jira transition skipped - secrets not configured"
          echo "Required secrets: JIRA_BASE_URL, JIRA_USER_EMAIL, JIRA_API_TOKEN"

  notify-deploy:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set script permissions
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Send deployment webhook
        if: env.WEBHOOK_URL != ''
        run: |
          deploy_status="${{ needs.deploy.result }}"
          curl -sSf -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"app\": \"${{ inputs.app_name }}\",
              \"environment\": \"${{ inputs.environment }}\",
              \"version\": \"${{ inputs.version }}\",
              \"status\": \"${deploy_status}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"
        env:
          WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}

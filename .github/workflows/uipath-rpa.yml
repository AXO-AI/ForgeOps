# RUNNER CONFIG: Using GitHub-hosted runners. Switch to self-hosted when ready (see docs/MIGRATION-TO-SELF-HOSTED.md)

name: "UiPath RPA CI/CD"

on:
  push:
    branches:
      - develop
      - "release/*"
      - "hotfix/*"
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: write

env:
  APP_NAME: "uipath-rpa-process" # ← CHANGE THIS PER REPO

jobs:
  # ──────────────────────────────────────────────
  # 1. Build
  # ──────────────────────────────────────────────
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $Branch = "${{ github.ref }}".Replace("refs/heads/", "")
          if ($Branch -like "release/*") {
            $Version = $Branch.Replace("release/", "")
          } elseif ($Branch -like "hotfix/*") {
            $Version = $Branch.Replace("hotfix/", "")
          } else {
            $Version = "dev.${{ github.run_number }}"
          }
          echo "version=$Version" >> $env:GITHUB_OUTPUT
          Write-Host "Resolved version: $Version"

      - name: Pack UiPath project
        shell: pwsh
        run: |
          $Version = "${{ steps.version.outputs.version }}"
          $OutputDir = ".\output"
          New-Item -ItemType Directory -Force -Path $OutputDir | Out-Null

          # Try UiPath Studio Command Line packing
          $StudioCli = "C:\Program Files\UiPath\Studio\UiPath.Studio.CommandLine.exe"
          if (Test-Path $StudioCli) {
            Write-Host "Packing with UiPath.Studio.CommandLine.exe..."
            & $StudioCli pack `
              --project-path "." `
              --output-path $OutputDir `
              --version $Version `
              --auto-version
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "UiPath pack returned exit code $LASTEXITCODE"
            }
          } else {
            Write-Warning "UiPath.Studio.CommandLine.exe not found — creating placeholder package."
            $PlaceholderName = "${{ env.APP_NAME }}.$Version.nupkg.zip"
            Compress-Archive -Path ".\*" -DestinationPath "$OutputDir\$PlaceholderName" -Force
            Write-Host "Created placeholder: $PlaceholderName"
          }

          # List generated artifacts
          Get-ChildItem -Path $OutputDir -Recurse | Format-Table Name, Length

      - name: Run UiPath tests
        shell: pwsh
        run: |
          if ([string]::IsNullOrEmpty("${{ secrets.UIPATH_ORCH_URL }}")) {
            Write-Host "::notice::UIPATH_ORCH_URL not set — skipping test run."
            exit 0
          }

          $UipCli = Get-Command uipcli -ErrorAction SilentlyContinue
          if (-not $UipCli) {
            Write-Host "::warning::uipcli not found — skipping test run."
            exit 0
          }

          Write-Host "Running UiPath test set..."
          uipcli test run `
            "${{ secrets.UIPATH_ORCH_URL }}" `
            "${{ secrets.UIPATH_TENANT }}" `
            --clientId "${{ secrets.UIPATH_CLIENT_ID }}" `
            --clientSecret "${{ secrets.UIPATH_CLIENT_SECRET }}" `
            --organizationUnit "${{ secrets.UIPATH_FOLDER }}" `
            --testset "${{ env.APP_NAME }}-tests" `
            --out ".\test-results"

      - name: Build Summary
        shell: pwsh
        run: |
          $NupkgFiles = Get-ChildItem -Path ".\output" -Filter "*.nupkg*" -Recurse
          $ArtifactCount = $NupkgFiles.Count
          $ArtifactSize = if ($ArtifactCount -gt 0) { ($NupkgFiles | Measure-Object -Property Length -Sum).Sum / 1KB } else { 0 }

          $Summary = @"
          ## Build Summary
          | Item | Value |
          |------|-------|
          | **Version** | ``${{ steps.version.outputs.version }}`` |
          | **Branch** | ``$($env:GITHUB_REF -replace 'refs/heads/', '')`` |
          | **Platform** | Windows (UiPath) |
          | **Packages** | $ArtifactCount |
          | **Total size** | $([math]::Round($ArtifactSize, 1)) KB |
          "@
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $Summary

      - name: Log via forgeops-log.sh
        shell: pwsh
        run: |
          if (Test-Path ".\scripts\forgeops-log.sh") {
            bash ./scripts/forgeops-log.sh
          } else {
            Write-Host "forgeops-log.sh not found, skipping."
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            output/*.nupkg
            output/*.nupkg.zip
          retention-days: 7

  # ──────────────────────────────────────────────
  # 2. Security scan
  # ──────────────────────────────────────────────
  security:
    needs: build
    uses: ./.github/workflows/_security-scan.yml
    with:
      project_name: ${{ github.event.repository.name }}
      language: javascript
    secrets: inherit

  # ──────────────────────────────────────────────
  # 3. Deploy to dev
  # ──────────────────────────────────────────────
  deploy-dev:
    needs: [build, security]
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_deploy.yml
    with:
      env: dev
      deploy_method: uipath-orchestrator
    secrets: inherit

  # ──────────────────────────────────────────────
  # 4. Deploy to qa (skip INT for RPA)
  # ──────────────────────────────────────────────
  deploy-qa:
    needs: [build, deploy-dev]
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_deploy.yml
    with:
      env: qa
      deploy_method: uipath-orchestrator
    secrets: inherit

  # ──────────────────────────────────────────────
  # 5. Deploy to stage
  # ──────────────────────────────────────────────
  deploy-stage:
    needs: [build, security]
    if: startsWith(github.ref, 'refs/heads/release/')
    uses: ./.github/workflows/_deploy.yml
    with:
      env: stage
      deploy_method: uipath-orchestrator
    secrets: inherit

  # ──────────────────────────────────────────────
  # 6. Deploy to prod
  # ──────────────────────────────────────────────
  deploy-prod:
    needs: [build, deploy-stage]
    if: startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/hotfix/')
    uses: ./.github/workflows/_deploy.yml
    with:
      env: prod
      deploy_method: uipath-orchestrator
      rollback_on_failure: true
    secrets: inherit

  # ──────────────────────────────────────────────
  # 7. Release tag
  # ──────────────────────────────────────────────
  release-tag:
    needs: [build, deploy-prod]
    if: success() && (startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/hotfix/'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Tag summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Release Tag
          | Item | Value |
          |------|-------|
          | **Tag** | \`v${{ needs.build.outputs.version }}\` |
          | **Commit** | \`${{ github.sha }}\` |
          | **Branch** | \`${GITHUB_REF#refs/heads/}\` |
          EOF

  # ──────────────────────────────────────────────
  # 8. Pipeline summary
  # ──────────────────────────────────────────────
  pipeline-summary:
    needs: [build, security, deploy-dev, deploy-qa, deploy-stage, deploy-prod, release-tag]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download forgeops artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: forgeops-*
          merge-multiple: true
          path: forgeops-logs

      - name: Run pipeline summary
        run: |
          if [ -f ./scripts/forgeops-summary.sh ]; then
            bash ./scripts/forgeops-summary.sh
          else
            echo "forgeops-summary.sh not found, writing default summary."
            cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Pipeline Summary
          | Job | Status |
          |-----|--------|
          | Build | \`${{ needs.build.result }}\` |
          | Security | \`${{ needs.security.result }}\` |
          | Deploy Dev | \`${{ needs.deploy-dev.result }}\` |
          | Deploy QA | \`${{ needs.deploy-qa.result }}\` |
          | Deploy Stage | \`${{ needs.deploy-stage.result }}\` |
          | Deploy Prod | \`${{ needs.deploy-prod.result }}\` |
          | Release Tag | \`${{ needs.release-tag.result }}\` |
          EOF
          fi

      - name: Upload audit trail
        uses: actions/upload-artifact@v4
        with:
          name: forgeops-audit-trail
          path: forgeops-logs/
          if-no-files-found: ignore
          retention-days: 365

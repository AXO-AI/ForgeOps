##############################################################################
# uipath-rpa.yml - CI/CD pipeline for uipath-rpa-bot
##############################################################################
name: UiPath RPA Bot Pipeline

on:
  push:
    branches:
      - int
      - qa
      - stage
      - main
      - "feature/*"
      - "hotfix/*"
  pull_request:
    branches:
      - int
      - qa
      - stage
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Target deployment environment"
        required: true
        type: choice
        options:
          - qa
          - stage
          - prod

env:
  APP_NAME: uipath-rpa-bot
  DEPLOY_METHOD: uipath-orchestrator

permissions:
  contents: write
  checks: write
  actions: read
  packages: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# JOBS
# ---------------------------------------------------------------------------
jobs:
  # -------------------------------------------------------------------------
  # Validate Secrets
  # -------------------------------------------------------------------------
  validate-secrets:
    name: Validate Secrets
    runs-on: windows-latest
    steps:
      - name: Check required secrets
        shell: pwsh
        run: |
          $missing = @()
          if ("${{ secrets.UIPATH_ACCOUNT_NAME }}" -eq "") { $missing += "UIPATH_ACCOUNT_NAME" }
          if ("${{ secrets.UIPATH_TENANT_NAME }}" -eq "") { $missing += "UIPATH_TENANT_NAME" }
          if ("${{ secrets.UIPATH_CLIENT_ID }}" -eq "") { $missing += "UIPATH_CLIENT_ID" }
          if ("${{ secrets.UIPATH_CLIENT_SECRET }}" -eq "") { $missing += "UIPATH_CLIENT_SECRET" }
          if ("${{ secrets.UIPATH_ORCHESTRATOR_URL }}" -eq "") { $missing += "UIPATH_ORCHESTRATOR_URL" }
          if ("${{ secrets.SLACK_WEBHOOK_URL }}" -eq "") { $missing += "SLACK_WEBHOOK_URL" }
          if ($missing.Count -gt 0) {
            Write-Error "Missing required secrets: $($missing -join ', ')"
            exit 1
          }
          Write-Host "All required secrets are configured."

  # -------------------------------------------------------------------------
  # Build
  # -------------------------------------------------------------------------
  build:
    name: Build & Analyze
    runs-on: windows-latest
    needs: validate-secrets
    outputs:
      version: ${{ steps.version.outputs.version }}
      package_name: ${{ steps.version.outputs.package_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up UiPath CLI
        shell: pwsh
        run: |
          $cliUrl = "https://uipath.pkgs.visualstudio.com/Public.Feeds/_packaging/UiPath-Official/nuget/v3/index.json"
          dotnet nuget add source $cliUrl --name UiPath 2>$null
          dotnet tool install UiPath.CLI --global --add-source $cliUrl || dotnet tool update UiPath.CLI --global --add-source $cliUrl

      - name: Analyze project
        shell: pwsh
        run: |
          uipcli package analyze "${{ github.workspace }}" --output-type json

      - name: Build NuGet package
        shell: pwsh
        run: |
          uipcli package pack "${{ github.workspace }}" `
            --output "${{ github.workspace }}\output" `
            --autoVersion

      - name: Compute version
        id: version
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 8)
          $branch = "${{ github.ref_name }}" -replace '/', '-'
          $version = "${branch}-${shortSha}"
          echo "version=${version}" >> $env:GITHUB_OUTPUT
          $pkg = Get-ChildItem -Path "${{ github.workspace }}\output\*.nupkg" | Select-Object -First 1
          echo "package_name=$($pkg.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: uipath-package
          path: output/*.nupkg
          retention-days: 30

  # -------------------------------------------------------------------------
  # Security Scan
  # -------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: windows-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan project files
        shell: pwsh
        run: |
          Write-Host "Running security analysis on UiPath project artifacts..."
          # Verify no secrets or credentials are embedded in XAML workflows
          $patterns = @("password", "secret", "apikey", "connectionstring")
          $found = $false
          foreach ($pattern in $patterns) {
            $matches = Get-ChildItem -Recurse -Include *.xaml | Select-String -Pattern $pattern -CaseSensitive:$false
            if ($matches) {
              Write-Warning "Potential credential found matching pattern: $pattern"
              $found = $true
            }
          }
          if ($found) {
            Write-Error "Security scan detected potential embedded credentials."
            exit 1
          }
          Write-Host "Security scan passed - no embedded credentials detected."

  # -------------------------------------------------------------------------
  # Deploy - QA (INT is skipped for UiPath)
  # -------------------------------------------------------------------------
  deploy-qa:
    name: Deploy to QA
    runs-on: windows-latest
    needs: [build, security]
    if: >-
      github.ref == 'refs/heads/qa'
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'qa')
    environment:
      name: qa
      url: ${{ secrets.UIPATH_ORCHESTRATOR_URL }}
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: uipath-package
          path: package

      - name: Deploy to QA via UiPath Orchestrator
        shell: pwsh
        run: |
          $cliUrl = "https://uipath.pkgs.visualstudio.com/Public.Feeds/_packaging/UiPath-Official/nuget/v3/index.json"
          dotnet tool install UiPath.CLI --global --add-source $cliUrl 2>$null

          $pkg = Get-ChildItem -Path "package\*.nupkg" | Select-Object -First 1
          Write-Host "Deploying $($pkg.Name) to QA via ${{ env.DEPLOY_METHOD }}"

          uipcli package deploy "$($pkg.FullName)" `
            "${{ secrets.UIPATH_ORCHESTRATOR_URL }}" `
            --accountName "${{ secrets.UIPATH_ACCOUNT_NAME }}" `
            --tenantName "${{ secrets.UIPATH_TENANT_NAME }}-qa" `
            --clientId "${{ secrets.UIPATH_CLIENT_ID }}" `
            --clientSecret "${{ secrets.UIPATH_CLIENT_SECRET }}"

  notify-qa:
    name: Notify - QA Deployment
    runs-on: ubuntu-latest
    needs: deploy-qa
    if: always()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v3
        with:
          payload: |
            {
              "text": "${{ env.APP_NAME }} deployed to QA via ${{ env.DEPLOY_METHOD }} - Status: ${{ needs.deploy-qa.result }} - Version: ${{ needs.build.outputs.version || 'N/A' }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # -------------------------------------------------------------------------
  # Deploy - STAGE
  # -------------------------------------------------------------------------
  deploy-stage:
    name: Deploy to STAGE
    runs-on: windows-latest
    needs: [build, security]
    if: >-
      github.ref == 'refs/heads/stage'
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'stage')
    environment:
      name: stage
      url: ${{ secrets.UIPATH_ORCHESTRATOR_URL }}
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: uipath-package
          path: package

      - name: Deploy to STAGE via UiPath Orchestrator
        shell: pwsh
        run: |
          $cliUrl = "https://uipath.pkgs.visualstudio.com/Public.Feeds/_packaging/UiPath-Official/nuget/v3/index.json"
          dotnet tool install UiPath.CLI --global --add-source $cliUrl 2>$null

          $pkg = Get-ChildItem -Path "package\*.nupkg" | Select-Object -First 1
          Write-Host "Deploying $($pkg.Name) to STAGE via ${{ env.DEPLOY_METHOD }}"

          uipcli package deploy "$($pkg.FullName)" `
            "${{ secrets.UIPATH_ORCHESTRATOR_URL }}" `
            --accountName "${{ secrets.UIPATH_ACCOUNT_NAME }}" `
            --tenantName "${{ secrets.UIPATH_TENANT_NAME }}-stage" `
            --clientId "${{ secrets.UIPATH_CLIENT_ID }}" `
            --clientSecret "${{ secrets.UIPATH_CLIENT_SECRET }}"

  notify-stage:
    name: Notify - STAGE Deployment
    runs-on: ubuntu-latest
    needs: deploy-stage
    if: always()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v3
        with:
          payload: |
            {
              "text": "${{ env.APP_NAME }} deployed to STAGE via ${{ env.DEPLOY_METHOD }} - Status: ${{ needs.deploy-stage.result }} - Version: ${{ needs.build.outputs.version || 'N/A' }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # -------------------------------------------------------------------------
  # Deploy - PROD
  # -------------------------------------------------------------------------
  deploy-prod:
    name: Deploy to PROD
    runs-on: windows-latest
    needs: [build, security]
    if: >-
      github.ref == 'refs/heads/main'
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
    environment:
      name: prod
      url: ${{ secrets.UIPATH_ORCHESTRATOR_URL }}
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: uipath-package
          path: package

      - name: Deploy to PROD via UiPath Orchestrator
        shell: pwsh
        run: |
          $cliUrl = "https://uipath.pkgs.visualstudio.com/Public.Feeds/_packaging/UiPath-Official/nuget/v3/index.json"
          dotnet tool install UiPath.CLI --global --add-source $cliUrl 2>$null

          $pkg = Get-ChildItem -Path "package\*.nupkg" | Select-Object -First 1
          Write-Host "Deploying $($pkg.Name) to PROD via ${{ env.DEPLOY_METHOD }}"

          uipcli package deploy "$($pkg.FullName)" `
            "${{ secrets.UIPATH_ORCHESTRATOR_URL }}" `
            --accountName "${{ secrets.UIPATH_ACCOUNT_NAME }}" `
            --tenantName "${{ secrets.UIPATH_TENANT_NAME }}" `
            --clientId "${{ secrets.UIPATH_CLIENT_ID }}" `
            --clientSecret "${{ secrets.UIPATH_CLIENT_SECRET }}"

  notify-prod:
    name: Notify - PROD Deployment
    runs-on: ubuntu-latest
    needs: deploy-prod
    if: always()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v3
        with:
          payload: |
            {
              "text": "${{ env.APP_NAME }} deployed to PROD via ${{ env.DEPLOY_METHOD }} - Status: ${{ needs.deploy-prod.result }} - Version: ${{ needs.build.outputs.version || 'N/A' }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # -------------------------------------------------------------------------
  # Notify Failure
  # -------------------------------------------------------------------------
  notify-failure:
    name: Notify - Pipeline Failure
    runs-on: ubuntu-latest
    needs: [validate-secrets, build, security]
    if: failure()
    steps:
      - name: Send failure notification
        uses: slackapi/slack-github-action@v3
        with:
          payload: |
            {
              "text": "PIPELINE FAILED: ${{ env.APP_NAME }} on branch ${{ github.ref_name }} - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # -------------------------------------------------------------------------
  # Release Tag (main branch only)
  # -------------------------------------------------------------------------
  release-tag:
    name: Create Release Tag
    runs-on: ubuntu-latest
    needs: deploy-prod
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          else
            CHANGELOG=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Determine next version tag
        id: tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f3)
          PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: "${{ env.APP_NAME }} ${{ steps.tag.outputs.new_tag }}"
          body: |
            ## Release ${{ steps.tag.outputs.new_tag }}

            ### Changelog
            ${{ steps.changelog.outputs.changelog }}

            ### Artifacts
            - Package: `${{ needs.build.outputs.package_name }}`
            - Deploy method: `${{ env.DEPLOY_METHOD }}`
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -------------------------------------------------------------------------
  # Pipeline Summary
  # -------------------------------------------------------------------------
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - validate-secrets
      - build
      - security
      - deploy-qa
      - deploy-stage
      - deploy-prod
      - release-tag
    steps:
      - name: Generate pipeline summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMMARY'
          ## Pipeline Summary - uipath-rpa-bot

          | Stage            | Status |
          |------------------|--------|
          | Validate Secrets | ${{ needs.validate-secrets.result }} |
          | Build & Analyze  | ${{ needs.build.result }} |
          | Security Scan    | ${{ needs.security.result }} |
          | Deploy QA        | ${{ needs.deploy-qa.result }} |
          | Deploy STAGE     | ${{ needs.deploy-stage.result }} |
          | Deploy PROD      | ${{ needs.deploy-prod.result }} |
          | Release Tag      | ${{ needs.release-tag.result }} |

          **Note:** INT deployment is skipped for UiPath RPA bots.

          **Branch:** `${{ github.ref_name }}`
          **Commit:** `${{ github.sha }}`
          **Triggered by:** `${{ github.actor }}`
          **Run:** [View](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          SUMMARY

name: Validate Secrets (Reusable)

on:
  workflow_call:
    outputs:
      all_configured:
        description: "Whether all secrets are configured"
        value: ${{ jobs.validate.outputs.all_configured }}
      report:
        description: "Markdown table of secret status"
        value: ${{ jobs.validate.outputs.report }}

jobs:
  validate:
    name: Validate Secret Configuration
    runs-on: ubuntu-latest
    outputs:
      all_configured: ${{ steps.check.outputs.all_configured }}
      report: ${{ steps.check.outputs.report }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set script permissions
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Check all secrets
        id: check
        run: |
          ALL_OK=true
          MISSING_LIST=""

          check_secret() {
            local NAME="$1"
            local VALUE="$2"
            if [ -n "$VALUE" ]; then
              echo "  ${NAME}: OK"
              echo "${NAME}=OK" >> "$GITHUB_ENV"
            else
              echo "  ${NAME}: MISSING"
              echo "${NAME}=MISSING" >> "$GITHUB_ENV"
              ALL_OK=false
              MISSING_LIST="${MISSING_LIST} ${NAME}"
            fi
          }

          echo "Checking secret configuration..."
          echo ""

          check_secret "SONAR_TOKEN" "$SECRET_SONAR_TOKEN"
          check_secret "SONAR_HOST_URL" "$SECRET_SONAR_HOST_URL"
          check_secret "BLACKDUCK_URL" "$SECRET_BLACKDUCK_URL"
          check_secret "BLACKDUCK_TOKEN" "$SECRET_BLACKDUCK_TOKEN"
          check_secret "JIRA_URL" "$SECRET_JIRA_URL"
          check_secret "JIRA_TOKEN" "$SECRET_JIRA_TOKEN"
          check_secret "SPLUNK_HEC_URL" "$SECRET_SPLUNK_HEC_URL"
          check_secret "SPLUNK_HEC_TOKEN" "$SECRET_SPLUNK_HEC_TOKEN"
          check_secret "TEAMS_WEBHOOK" "$SECRET_TEAMS_WEBHOOK"
          check_secret "SMTP_SERVER" "$SECRET_SMTP_SERVER"
          check_secret "SMTP_USERNAME" "$SECRET_SMTP_USERNAME"
          check_secret "SMTP_PASSWORD" "$SECRET_SMTP_PASSWORD"
          check_secret "CHERWELL_URL" "$SECRET_CHERWELL_URL"
          check_secret "CHERWELL_CLIENT_ID" "$SECRET_CHERWELL_CLIENT_ID"
          check_secret "DEPLOY_SSH_KEY" "$SECRET_DEPLOY_SSH_KEY"
          check_secret "ARGOCD_SERVER" "$SECRET_ARGOCD_SERVER"
          check_secret "UIPATH_ORCH_URL" "$SECRET_UIPATH_ORCH_URL"

          echo "all_configured=${ALL_OK}" >> "$GITHUB_OUTPUT"
          echo "missing=${MISSING_LIST}" >> "$GITHUB_OUTPUT"

          REPORT=$(cat <<'ENDREPORT'
          ## Secret Health Check

          | Secret | Status |
          |--------|--------|
          ENDREPORT
          )

          # Build report dynamically
          {
            echo "## Secret Health Check"
            echo ""
            echo "| Secret | Status |"
            echo "|--------|--------|"
          } > /tmp/secret-report.md

          for SECRET_NAME in SONAR_TOKEN SONAR_HOST_URL BLACKDUCK_URL BLACKDUCK_TOKEN JIRA_URL JIRA_TOKEN SPLUNK_HEC_URL SPLUNK_HEC_TOKEN TEAMS_WEBHOOK SMTP_SERVER SMTP_USERNAME SMTP_PASSWORD CHERWELL_URL CHERWELL_CLIENT_ID DEPLOY_SSH_KEY ARGOCD_SERVER UIPATH_ORCH_URL; do
            STATUS_VAR="${SECRET_NAME}"
            STATUS_VALUE="${!STATUS_VAR:-UNKNOWN}"
            echo "| ${SECRET_NAME} | ${STATUS_VALUE} |" >> /tmp/secret-report.md
          done

          echo "" >> /tmp/secret-report.md
          if [ "$ALL_OK" == "true" ]; then
            echo "**All secrets: OK**" >> /tmp/secret-report.md
          else
            echo "**Missing secrets:${MISSING_LIST}**" >> /tmp/secret-report.md
          fi

          cat /tmp/secret-report.md >> "$GITHUB_STEP_SUMMARY"

          # Set multiline output
          {
            echo "report<<EOF"
            cat /tmp/secret-report.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          SECRET_SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SECRET_SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SECRET_BLACKDUCK_URL: ${{ secrets.BLACKDUCK_URL }}
          SECRET_BLACKDUCK_TOKEN: ${{ secrets.BLACKDUCK_TOKEN }}
          SECRET_JIRA_URL: ${{ secrets.JIRA_URL }}
          SECRET_JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          SECRET_SPLUNK_HEC_URL: ${{ secrets.SPLUNK_HEC_URL }}
          SECRET_SPLUNK_HEC_TOKEN: ${{ secrets.SPLUNK_HEC_TOKEN }}
          SECRET_TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
          SECRET_SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SECRET_SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SECRET_SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SECRET_CHERWELL_URL: ${{ secrets.CHERWELL_URL }}
          SECRET_CHERWELL_CLIENT_ID: ${{ secrets.CHERWELL_CLIENT_ID }}
          SECRET_DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SECRET_ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          SECRET_UIPATH_ORCH_URL: ${{ secrets.UIPATH_ORCH_URL }}

name: "Validate Secrets"
on:
  workflow_call:
    secrets:
      SONAR_TOKEN: {required: false}
      SONAR_HOST_URL: {required: false}
      BLACKDUCK_URL: {required: false}
      BLACKDUCK_TOKEN: {required: false}
      JIRA_URL: {required: false}
      JIRA_TOKEN: {required: false}
      SPLUNK_HEC_URL: {required: false}
      SPLUNK_HEC_TOKEN: {required: false}
      CHERWELL_URL: {required: false}
      CHERWELL_CLIENT_ID: {required: false}
      SLACK_WEBHOOK_URL: {required: false}
      DEPLOY_SSH_KEY: {required: false}
      ARGOCD_SERVER: {required: false}
      UIPATH_ORCH_URL: {required: false}

jobs:
  validate:
    name: "Integration Status"
    runs-on: ubuntu-latest
    steps:
      - name: Check All Secrets
        env:
          S1: ${{ secrets.SONAR_TOKEN }}
          S2: ${{ secrets.SONAR_HOST_URL }}
          S3: ${{ secrets.BLACKDUCK_URL }}
          S4: ${{ secrets.BLACKDUCK_TOKEN }}
          S5: ${{ secrets.JIRA_URL }}
          S6: ${{ secrets.JIRA_TOKEN }}
          S7: ${{ secrets.SPLUNK_HEC_URL }}
          S8: ${{ secrets.SPLUNK_HEC_TOKEN }}
          S9: ${{ secrets.CHERWELL_URL }}
          S10: ${{ secrets.CHERWELL_CLIENT_ID }}
          S11: ${{ secrets.SLACK_WEBHOOK_URL }}
          S12: ${{ secrets.DEPLOY_SSH_KEY }}
          S13: ${{ secrets.ARGOCD_SERVER }}
          S14: ${{ secrets.UIPATH_ORCH_URL }}
        run: |
          echo "## 🔐 ForgeOps Integration Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Integration | Secret | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          check() { if [ -n "$3" ]; then echo "| $1 | \`$2\` | ✅ Configured |" >> $GITHUB_STEP_SUMMARY; else echo "| $1 | \`$2\` | ⚠️ Not set |" >> $GITHUB_STEP_SUMMARY; fi; }
          check "SonarQube" "SONAR_TOKEN" "$S1"
          check "SonarQube" "SONAR_HOST_URL" "$S2"
          check "Black Duck" "BLACKDUCK_URL" "$S3"
          check "Black Duck" "BLACKDUCK_TOKEN" "$S4"
          check "Jira" "JIRA_URL" "$S5"
          check "Jira" "JIRA_TOKEN" "$S6"
          check "Splunk" "SPLUNK_HEC_URL" "$S7"
          check "Splunk" "SPLUNK_HEC_TOKEN" "$S8"
          check "Cherwell" "CHERWELL_URL" "$S9"
          check "Cherwell" "CHERWELL_CLIENT_ID" "$S10"
          check "Slack" "SLACK_WEBHOOK_URL" "$S11"
          check "Deploy" "DEPLOY_SSH_KEY" "$S12"
          check "ArgoCD" "ARGOCD_SERVER" "$S13"
          check "UiPath" "UIPATH_ORCH_URL" "$S14"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Unconfigured integrations skip gracefully." >> $GITHUB_STEP_SUMMARY

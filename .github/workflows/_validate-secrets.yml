name: Validate Secrets (Reusable)

on:
  workflow_call:
    outputs:
      all_configured:
        description: "Whether all secrets are configured"
        value: ${{ jobs.validate.outputs.all_configured }}
      report:
        description: "Markdown table of secret status"
        value: ${{ jobs.validate.outputs.report }}
    secrets:
      SONARQUBE_TOKEN:
        required: false
      SONARQUBE_URL:
        required: false
      BLACK_DUCK_TOKEN:
        required: false
      BLACK_DUCK_URL:
        required: false
      GITLEAKS_LICENSE:
        required: false
      JIRA_BASE_URL:
        required: false
      JIRA_USER_EMAIL:
        required: false
      JIRA_API_TOKEN:
        required: false
      ARGOCD_SERVER:
        required: false
      ARGOCD_TOKEN:
        required: false
      SSH_PRIVATE_KEY:
        required: false
      MAIL_SERVER:
        required: false
      MAIL_USERNAME:
        required: false
      MAIL_PASSWORD:
        required: false
      TEAMS_WEBHOOK_URL:
        required: false
      SPLUNK_HEC_URL:
        required: false
      SPLUNK_HEC_TOKEN:
        required: false
      CHERWELL_API_KEY:
        required: false

jobs:
  validate:
    name: Check Secret Configuration
    runs-on: ubuntu-latest
    outputs:
      all_configured: ${{ steps.check.outputs.all_configured }}
      report: ${{ steps.check.outputs.report }}
    steps:
      - name: Validate secrets
        id: check
        env:
          S_SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          S_SONARQUBE_URL: ${{ secrets.SONARQUBE_URL }}
          S_BLACK_DUCK_TOKEN: ${{ secrets.BLACK_DUCK_TOKEN }}
          S_BLACK_DUCK_URL: ${{ secrets.BLACK_DUCK_URL }}
          S_GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          S_JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          S_JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          S_JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          S_ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          S_ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
          S_SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          S_MAIL_SERVER: ${{ secrets.MAIL_SERVER }}
          S_MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          S_MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          S_TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          S_SPLUNK_HEC_URL: ${{ secrets.SPLUNK_HEC_URL }}
          S_SPLUNK_HEC_TOKEN: ${{ secrets.SPLUNK_HEC_TOKEN }}
          S_CHERWELL_API_KEY: ${{ secrets.CHERWELL_API_KEY }}
        run: |
          MISSING=0
          TABLE="| Secret | Status |\n|--------|--------|\n"
          SECRETS="SONARQUBE_TOKEN SONARQUBE_URL BLACK_DUCK_TOKEN BLACK_DUCK_URL GITLEAKS_LICENSE JIRA_BASE_URL JIRA_USER_EMAIL JIRA_API_TOKEN ARGOCD_SERVER ARGOCD_TOKEN SSH_PRIVATE_KEY MAIL_SERVER MAIL_USERNAME MAIL_PASSWORD TEAMS_WEBHOOK_URL SPLUNK_HEC_URL SPLUNK_HEC_TOKEN CHERWELL_API_KEY"
          for SECRET in $SECRETS; do
            VAR="S_${SECRET}"
            if [ -n "${!VAR}" ]; then
              TABLE="${TABLE}| ${SECRET} | Configured |\n"
            else
              TABLE="${TABLE}| ${SECRET} | **MISSING** |\n"
              MISSING=$((MISSING + 1))
            fi
          done

          echo -e "$TABLE" >> "$GITHUB_STEP_SUMMARY"

          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "report<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
          echo -e "$TABLE" >> "$GITHUB_OUTPUT"
          echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"

          if [ "$MISSING" -eq 0 ]; then
            echo "all_configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "all_configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::$MISSING secret(s) not configured"
          fi

name: Validate Secrets (Reusable)

on:
  workflow_call:
    outputs:
      all_ok:
        description: "Whether all secrets are configured"
        value: ${{ jobs.validate.outputs.all_ok }}
      summary:
        description: "Markdown summary of secret status"
        value: ${{ jobs.validate.outputs.summary }}
      missing_count:
        description: "Number of missing secrets"
        value: ${{ jobs.validate.outputs.missing_count }}
    secrets:
      BLACK_DUCK_URL:
        required: false
      BLACK_DUCK_API_TOKEN:
        required: false
      SNYK_TOKEN:
        required: false
      ARGOCD_SERVER:
        required: false
      ARGOCD_AUTH_TOKEN:
        required: false
      SSH_HOST:
        required: false
      SSH_USER:
        required: false
      SSH_PRIVATE_KEY:
        required: false
      JIRA_BASE_URL:
        required: false
      JIRA_USER_EMAIL:
        required: false
      JIRA_API_TOKEN:
        required: false
      EMAIL_SERVER:
        required: false
      EMAIL_USERNAME:
        required: false
      EMAIL_PASSWORD:
        required: false
      EMAIL_TO:
        required: false
      TEAMS_WEBHOOK_URL:
        required: false
      SPLUNK_HEC_URL:
        required: false
      SPLUNK_HEC_TOKEN:
        required: false

jobs:
  validate:
    name: Validate 18 Secrets
    runs-on: ubuntu-latest
    outputs:
      all_ok: ${{ steps.check.outputs.all_ok }}
      summary: ${{ steps.check.outputs.summary }}
      missing_count: ${{ steps.check.outputs.missing_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set script permissions
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Check all secrets
        id: check
        run: |
          missing=0
          total=18

          check_secret() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              echo "| ${name} | OK |"
            else
              echo "| ${name} | MISSING |"
              missing=$((missing + 1))
            fi
          }

          {
            echo "## Secret Health Check"
            echo ""
            echo "| Secret | Status |"
            echo "|--------|--------|"
          } > secret-report.md

          # Security scanning secrets
          [ -n "$SECRET_01" ] && echo "| BLACK_DUCK_URL | OK |" >> secret-report.md || { echo "| BLACK_DUCK_URL | MISSING |" >> secret-report.md; missing=$((missing + 1)); }
          [ -n "$SECRET_02" ] && echo "| BLACK_DUCK_API_TOKEN | OK |" >> secret-report.md || { echo "| BLACK_DUCK_API_TOKEN | MISSING |" >> secret-report.md; missing=$((missing + 1)); }
          [ -n "$SECRET_03" ] && echo "| SNYK_TOKEN | OK |" >> secret-report.md || { echo "| SNYK_TOKEN | MISSING |" >> secret-report.md; missing=$((missing + 1)); }

          # Deployment secrets
          [ -n "$SECRET_04" ] && echo "| ARGOCD_SERVER | OK |" >> secret-report.md || { echo "| ARGOCD_SERVER | MISSING |" >> secret-report.md; missing=$((missing + 1)); }
          [ -n "$SECRET_05" ] && echo "| ARGOCD_AUTH_TOKEN | OK |" >> secret-report.md || { echo "| ARGOCD_AUTH_TOKEN | MISSING |" >> secret-report.md; missing=$((missing + 1)); }
          [ -n "$SECRET_06" ] && echo "| SSH_HOST | OK |" >> secret-report.md || { echo "| SSH_HOST | MISSING |" >> secret-report.md; missing=$((missing + 1)); }
          [ -n "$SECRET_07" ] && echo "| SSH_USER | OK |" >> secret-report.md || { echo "| SSH_USER | MISSING |" >> secret-report.md; missing=$((missing + 1)); }
          [ -n "$SECRET_08" ] && echo "| SSH_PRIVATE_KEY | OK |" >> secret-report.md || { echo "| SSH_PRIVATE_KEY | MISSING |" >> secret-report.md; missing=$((missing + 1)); }

          # Jira secrets
          [ -n "$SECRET_09" ] && echo "| JIRA_BASE_URL | OK |" >> secret-report.md || { echo "| JIRA_BASE_URL | MISSING |" >> secret-report.md; missing=$((missing + 1)); }
          [ -n "$SECRET_10" ] && echo "| JIRA_USER_EMAIL | OK |" >> secret-report.md || { echo "| JIRA_USER_EMAIL | MISSING |" >> secret-report.md; missing=$((missing + 1)); }
          [ -n "$SECRET_11" ] && echo "| JIRA_API_TOKEN | OK |" >> secret-report.md || { echo "| JIRA_API_TOKEN | MISSING |" >> secret-report.md; missing=$((missing + 1)); }

          # Notification secrets
          [ -n "$SECRET_12" ] && echo "| EMAIL_SERVER | OK |" >> secret-report.md || { echo "| EMAIL_SERVER | MISSING |" >> secret-report.md; missing=$((missing + 1)); }
          [ -n "$SECRET_13" ] && echo "| EMAIL_USERNAME | OK |" >> secret-report.md || { echo "| EMAIL_USERNAME | MISSING |" >> secret-report.md; missing=$((missing + 1)); }
          [ -n "$SECRET_14" ] && echo "| EMAIL_PASSWORD | OK |" >> secret-report.md || { echo "| EMAIL_PASSWORD | MISSING |" >> secret-report.md; missing=$((missing + 1)); }
          [ -n "$SECRET_15" ] && echo "| EMAIL_TO | OK |" >> secret-report.md || { echo "| EMAIL_TO | MISSING |" >> secret-report.md; missing=$((missing + 1)); }
          [ -n "$SECRET_16" ] && echo "| TEAMS_WEBHOOK_URL | OK |" >> secret-report.md || { echo "| TEAMS_WEBHOOK_URL | MISSING |" >> secret-report.md; missing=$((missing + 1)); }
          [ -n "$SECRET_17" ] && echo "| SPLUNK_HEC_URL | OK |" >> secret-report.md || { echo "| SPLUNK_HEC_URL | MISSING |" >> secret-report.md; missing=$((missing + 1)); }
          [ -n "$SECRET_18" ] && echo "| SPLUNK_HEC_TOKEN | OK |" >> secret-report.md || { echo "| SPLUNK_HEC_TOKEN | MISSING |" >> secret-report.md; missing=$((missing + 1)); }

          echo "" >> secret-report.md
          configured=$((total - missing))
          echo "**Result: ${configured}/${total} secrets configured, ${missing} MISSING**" >> secret-report.md

          if [ "$missing" -eq 0 ]; then
            echo "all_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "all_ok=false" >> "$GITHUB_OUTPUT"
          fi
          echo "missing_count=$missing" >> "$GITHUB_OUTPUT"

          # Output summary as single line for workflow output
          summary=$(cat secret-report.md | tr '\n' '\\n')
          echo "summary<<EOFSUM" >> "$GITHUB_OUTPUT"
          cat secret-report.md >> "$GITHUB_OUTPUT"
          echo "EOFSUM" >> "$GITHUB_OUTPUT"

          # Write to step summary
          cat secret-report.md >> "$GITHUB_STEP_SUMMARY"

          echo ""
          echo "Secret validation complete: ${configured}/${total} configured, ${missing} MISSING"
        env:
          SECRET_01: ${{ secrets.BLACK_DUCK_URL }}
          SECRET_02: ${{ secrets.BLACK_DUCK_API_TOKEN }}
          SECRET_03: ${{ secrets.SNYK_TOKEN }}
          SECRET_04: ${{ secrets.ARGOCD_SERVER }}
          SECRET_05: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          SECRET_06: ${{ secrets.SSH_HOST }}
          SECRET_07: ${{ secrets.SSH_USER }}
          SECRET_08: ${{ secrets.SSH_PRIVATE_KEY }}
          SECRET_09: ${{ secrets.JIRA_BASE_URL }}
          SECRET_10: ${{ secrets.JIRA_USER_EMAIL }}
          SECRET_11: ${{ secrets.JIRA_API_TOKEN }}
          SECRET_12: ${{ secrets.EMAIL_SERVER }}
          SECRET_13: ${{ secrets.EMAIL_USERNAME }}
          SECRET_14: ${{ secrets.EMAIL_PASSWORD }}
          SECRET_15: ${{ secrets.EMAIL_TO }}
          SECRET_16: ${{ secrets.TEAMS_WEBHOOK_URL }}
          SECRET_17: ${{ secrets.SPLUNK_HEC_URL }}
          SECRET_18: ${{ secrets.SPLUNK_HEC_TOKEN }}

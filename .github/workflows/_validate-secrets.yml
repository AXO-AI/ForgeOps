name: "Validate Secrets"

on:
  workflow_call:
    secrets:
      SONAR_TOKEN: { required: false }
      SONAR_HOST_URL: { required: false }
      BLACKDUCK_URL: { required: false }
      BLACKDUCK_TOKEN: { required: false }
      JIRA_URL: { required: false }
      JIRA_TOKEN: { required: false }
      SPLUNK_HEC_URL: { required: false }
      SPLUNK_HEC_TOKEN: { required: false }
      CHERWELL_URL: { required: false }
      CHERWELL_CLIENT_ID: { required: false }
      SLACK_WEBHOOK_URL: { required: false }
      DEPLOY_SSH_KEY: { required: false }
      ARGOCD_SERVER: { required: false }
      UIPATH_ORCH_URL: { required: false }

jobs:
  validate:
    name: "Integration Status"
    runs-on: ubuntu-latest
    steps:
      - name: Check All Secrets
        run: |
          echo "## 🔐 ForgeOps Integration Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Integration | Secret | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY

          check() {
            local integration="$1" secret_name="$2" secret_val="$3"
            if [ -n "$secret_val" ]; then
              echo "| $integration | \`$secret_name\` | ✅ Configured |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $integration | \`$secret_name\` | ⚠️ Not set |" >> $GITHUB_STEP_SUMMARY
            fi
          }

          check "SonarQube" "SONAR_TOKEN" "$S_TOK"
          check "SonarQube" "SONAR_HOST_URL" "$S_URL"
          check "Black Duck" "BLACKDUCK_URL" "$BD_URL"
          check "Black Duck" "BLACKDUCK_TOKEN" "$BD_TOK"
          check "Jira" "JIRA_URL" "$J_URL"
          check "Jira" "JIRA_TOKEN" "$J_TOK"
          check "Splunk" "SPLUNK_HEC_URL" "$SP_URL"
          check "Splunk" "SPLUNK_HEC_TOKEN" "$SP_TOK"
          check "Cherwell" "CHERWELL_URL" "$CH_URL"
          check "Cherwell" "CHERWELL_CLIENT_ID" "$CH_ID"
          check "Slack" "SLACK_WEBHOOK_URL" "$SL_URL"
          check "Deploy" "DEPLOY_SSH_KEY" "$SSH_KEY"
          check "ArgoCD" "ARGOCD_SERVER" "$ARGO"
          check "UiPath" "UIPATH_ORCH_URL" "$UIP"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⏭️ Unconfigured integrations are skipped gracefully — pipelines never fail due to missing secrets." >> $GITHUB_STEP_SUMMARY
        env:
          S_TOK: ${{ secrets.SONAR_TOKEN }}
          S_URL: ${{ secrets.SONAR_HOST_URL }}
          BD_URL: ${{ secrets.BLACKDUCK_URL }}
          BD_TOK: ${{ secrets.BLACKDUCK_TOKEN }}
          J_URL: ${{ secrets.JIRA_URL }}
          J_TOK: ${{ secrets.JIRA_TOKEN }}
          SP_URL: ${{ secrets.SPLUNK_HEC_URL }}
          SP_TOK: ${{ secrets.SPLUNK_HEC_TOKEN }}
          CH_URL: ${{ secrets.CHERWELL_URL }}
          CH_ID: ${{ secrets.CHERWELL_CLIENT_ID }}
          SL_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          ARGO: ${{ secrets.ARGOCD_SERVER }}
          UIP: ${{ secrets.UIPATH_ORCH_URL }}

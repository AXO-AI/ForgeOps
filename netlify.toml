[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"
  functions = "../netlify/functions"

[[redirects]]
  from = "/api/jira/*"
  to = "/.netlify/functions/jira/:splat"
  status = 200

[[redirects]]
  from = "/api/github/*"
  to = "/.netlify/functions/github-api/:splat"
  status = 200

[[redirects]]
  from = "/api/ai/*"
  to = "/.netlify/functions/ai/:splat"
  status = 200

[[redirects]]
  from = "/api/teams/*"
  to = "/.netlify/functions/teams/:splat"
  status = 200

[[redirects]]
  from = "/api/onboarding/*"
  to = "/.netlify/functions/onboarding/:splat"
  status = 200

[[redirects]]
  from = "/api/discovery/*"
  to = "/.netlify/functions/discovery/:splat"
  status = 200

[[redirects]]
  from = "/api/sca/*"
  to = "/.netlify/functions/sca/:splat"
  status = 200

[[redirects]]
  from = "/api/support/*"
  to = "/.netlify/functions/support/:splat"
  status = 200

[[redirects]]
  from = "/api/splunk/*"
  to = "/.netlify/functions/splunk/:splat"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
